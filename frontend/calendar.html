<!DOCTYPE html>
<html>
<head>
    <title>Booking Calendar</title>

    <style>
        body {
            font-family: 'Google Sans', Arial;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .calendar {
            width: 350px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            padding: 5px 10px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .days, .dates {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            gap: 5px;
        }

        .dates {
            margin-top: 10px;
        }

        .date {
            padding: 10px;
            background: #f1f1f1;
            border-radius: 5px;
            cursor: pointer;
        }

        .date:hover {
            background: #dce9ff;
        }

        .selected {
            background: #007bff;
            color: white;
        }

        .empty {
            background: transparent;
        }

        #datetime {
            margin-top: 10px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            background: #a8ebe9;
            padding: 5px;
            border-radius: 5px;
        }

        /* CHOSEN BOX */
        .chosen-box {
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
            color: black;
            opacity: 0;
            transform: translateY(-10px);
            transition: 0.3s;
            margin-top: 10px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            background: #ebbea8;
            padding: 5px;
            border-radius: 5px;
        }


        .chosen-box.show {
            opacity: 1;
            transform: translateY(0);
        }

        #doneBtn {
            display: none;
            margin: 10px auto;
            padding: 8px 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #timeSection {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: #f1f1f1;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div>
    <div id="chosenBox" class="chosen-box"></div>

    <div class="calendar">
        <div class="header">
            <button onclick="prevMonth()">⬅</button>
            <h3 id="monthYear"></h3>
            <button onclick="nextMonth()">➡</button>
        </div>

        <div class="days">
            <div>Mon</div><div>Tue</div><div>Wed</div>
            <div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
        </div>

        <div class="dates" id="dates"></div>

        <div id="datetime"></div>
    </div>
    <button id="doneBtn" onclick="goToTime()">Tap to Confirm</button>
    <div id="timeSection">
        <h2>Select Time</h2>
        <p>Time slots will appear here</p>
    </div>
</div>

<script>
let currentDate = new Date();
let selectedDateText = "";

function renderCalendar() {
    const datesContainer = document.getElementById("dates");
    const monthYear = document.getElementById("monthYear");

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();

    const months = [
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
    ];

    monthYear.innerText = months[month] + " " + year;

    datesContainer.innerHTML = "";

    let startIndex = (firstDay === 0) ? 6 : firstDay - 1;

    // empty cells
    for (let i = 0; i < startIndex; i++) {
        let empty = document.createElement("div");
        empty.classList.add("empty");
        datesContainer.appendChild(empty);
    }

    const today = new Date();
    today.setHours(0,0,0,0);

    for (let day = 1; day <= lastDate; day++) {
        const dateEl = document.createElement("div");
        dateEl.classList.add("date");
        dateEl.innerText = day;

        const thisDate = new Date(year, month, day);

        if (thisDate < today) {
            dateEl.style.opacity = "0.4";
            dateEl.style.pointerEvents = "none";
        } else {
            dateEl.addEventListener("click", () => {

                document.querySelectorAll(".date")
                    .forEach(d => d.classList.remove("selected"));

                dateEl.classList.add("selected");

                const selected = new Date(year, month, day);

                selectedDateText = selected.toLocaleDateString(undefined, {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });

                const box = document.getElementById("chosenBox");
                box.innerText = "Selected Date: " + selectedDateText;
                box.classList.add("show");

                document.getElementById("doneBtn").style.display = "block";
            });
        }

        datesContainer.appendChild(dateEl);
    }
}

function nextMonth() {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar();
}

function prevMonth() {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar();
}

renderCalendar();

// realtime clock
function updateDateTime() {
    const now = new Date();

    const options = {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    };

    const date = now.toLocaleDateString('en-GB', options);
    const time = now.toLocaleTimeString('en-US', {
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
    });

    document.getElementById("datetime").innerHTML =
        `${date} | ${time}`;
}

setInterval(updateDateTime, 1000);
updateDateTime();

/* DONE BUTTON */
function goToTime() {
    if (!selectedDateText) return;

    document.getElementById("timeSection").style.display = "block";

    document.getElementById("timeSection")
        .scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>
