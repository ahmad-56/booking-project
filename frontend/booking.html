<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="progress-header">
    <div class="progress-bar" role="progressbar" aria-valuenow="4" aria-valuemin="1" aria-valuemax="4" aria-label="Booking progress">
        <div class="progress-fill step-4"></div>
    </div>
    <div class="progress-label">
        <a href="pages/time/time.html" class="back-btn">← Back</a>
        <span>Step 4 of 4</span>
    </div>
</header>

<div class="container">

    <h1 class="step-heading">STEP 4</h1>
    <h3>Select Date & Time</h3>

    <input type="date">
    <input type="time">

    <input type="text" placeholder="Service (e.g. Doctor, Salon, Tutor)">

    <button onclick="confirmBooking()">Book Now</button>

    <p id="msg"></p>
</div>

<script>
function confirmBooking() {
    document.getElementById("msg").innerText =
        "Booking created (frontend only - backend not connected yet)";
}
</script>

</body>
</html>
