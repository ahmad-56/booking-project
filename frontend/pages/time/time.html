<!DOCTYPE html>
<html>

<head>
    <title>Select Time</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="time.css">
</head>

<body>

<header class="progress-header">
    <div class="progress-bar" role="progressbar" aria-valuenow="3" aria-valuemin="1" aria-valuemax="4" aria-label="Booking progress">
        <div class="progress-fill step-3"></div>
    </div>
    <div class="progress-label">
        <a href="../calendar/calendar.html" class="back-btn">← Back</a>
        <span>Step 3 of 4</span>
    </div>
</header>

<h1 class="step-heading">STEP 3</h1>

<div class="booking-container">

    <!-- LEFT PANEL -->
    <div class="slots-panel">

        <h2>Select Time Slots</h2>

        <p id="dateInfo"></p>

        <div id="slots"></div>

        <button id="customBtn">
            + Custom Time
        </button>

        <div class="custom-time-box" id="customTimeBox" style="display:none;">

            <h3>Enter Custom Time</h3>

            <div class="custom-inputs">

                <input
                    type="text"
                    id="customHour"
                    maxlength="2"
                    placeholder="HH">

                <span>:</span>

                <input
                    type="text"
                    id="customMinute"
                    maxlength="2"
                    placeholder="MM">

                <select id="customPeriod">
                    <option>AM</option>
                    <option>PM</option>
                </select>
            <br>
                <input
                    type="text"
                    id="customHour"
                    maxlength="2"
                    placeholder="HH">

                <span>:</span>

                <input
                    type="text"
                    id="customMinute"
                    maxlength="2"
                    placeholder="MM">

                <select id="customPeriod">
                    <option>AM</option>
                    <option>PM</option>
                </select>

            <br>
                <button id="addCustomTime">
                    Add
                </button>

            </div>

        </div>

    </div>

    <!-- RIGHT PANEL -->

    <div class="summary-panel">
        <h2>Booking Summary</h2>
        <div class="summary-section">
            <div class="summary-title">
                Date
            </div>
            <p id="summaryDate"></p>
        </div>

        <div class="summary-section">
            <div class="summary-title">
                Selected Time Slots:
                <br>
            </div>
            <ul id="summarySlots">
            <li class="empty-slot">No slots selected</li>
            </ul>
        </div>

        <div class="summary-section">
            <strong>Total Slots:</strong>
            <span id="totalSlots">0</span>
        </div>

        <button onclick="confirmBooking()">
            Confirm Booking
        </button>

    </div>

</div>

<script src="utils.js"></script>
<script src="slots.js"></script>
<script src="summary.js"></script>
<script src="customTime.js"></script>
<script src="time.js"></script>
</body>

</html>
