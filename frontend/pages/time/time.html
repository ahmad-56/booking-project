<!DOCTYPE html>
<html>
<head>
    <title>Select Time</title>

    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            margin-top: 50px;
            background: #f4f6f8;
        }

        .box {
            width: 350px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .slot {
            padding: 10px;
            margin: 5px;
            background: #f1f1f1;
            border-radius: 5px;
            cursor: pointer;
        }

        .slot:hover {
            background: #dce9ff;
        }

        .selected {
            background: #007bff;
            color: white;
        }

        #dateInfo {
            font-weight: bold;
            margin-bottom: 10px;
        }

        button {
            margin-top: 10px;
            padding: 8px 15px;
            border: none;
            background: #28a745;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="box">

    <div id="dateInfo"></div>

    <h3>Select Time Slot</h3>

    <div id="slots"></div>

    <button onclick="confirm()">Confirm</button>

</div>

<script>
const selectedDate = localStorage.getItem("selectedDate");

document.getElementById("dateInfo").innerText =
    "Selected Date: " + selectedDate;

// 12 AM → 12 PM slots
const slotsContainer = document.getElementById("slots");

const times = [
    "12:00 AM - 1:00 AM",
    "1:00 AM - 2:00 AM",
    "2:00 AM - 3:00 AM",
    "3:00 AM - 4:00 AM",
    "4:00 AM - 5:00 AM",
    "5:00 AM - 6:00 AM",
    "6:00 AM - 7:00 AM",
    "7:00 AM - 8:00 AM",
    "8:00 AM - 9:00 AM",
    "9:00 AM - 10:00 AM",
    "10:00 AM - 11:00 AM",
    "11:00 AM - 12:00 PM",
    "12:00 PM - 1:00 PM",
    "1:00 PM - 2:00 PM",
    "2:00 PM - 3:00 PM",
    "3:00 PM - 4:00 PM",
    "4:00 PM - 5:00 PM",
    "5:00 PM - 6:00 PM",
    "6:00 PM - 7:00 PM",
    "7:00 PM - 8:00 PM",
    "8:00 PM - 9:00 PM",
    "9:00 PM - 10:00 PM",
    "10:00 PM - 11:00 PM",
    "11:00 PM - 12:00 AM"
];

let selectedTime = "";

times.forEach(time => {
    const div = document.createElement("div");
    div.classList.add("slot");
    div.innerText = time;

    div.onclick = () => {
        document.querySelectorAll(".slot")
            .forEach(s => s.classList.remove("selected"));

        div.classList.add("selected");
        selectedTime = time;
    };

    slotsContainer.appendChild(div);
});

function confirm() {
    if (!selectedTime) {
        alert("Please select a time slot!");
        return;
    }

    localStorage.setItem("selectedTime", selectedTime);

    alert("Booking Confirmed!\n" + selectedDate + "\n" + selectedTime);
}
</script>

</body>
</html>
