<!DOCTYPE html>
<html>
<head>
    <title>Booking Calendar</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calendar.css">
</head>

<body>

<div>

    <div id="chosenBox" class="chosen-box"></div>

    <div class="calendar">
        <div class="header">
            <button onclick="prevMonth()">⬅</button>
            <h3 id="monthYear"></h3>
            <button onclick="nextMonth()">➡</button>
        </div>

        <div class="days">
            <div>Mon</div><div>Tue</div><div>Wed</div>
            <div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
        </div>

        <div class="dates" id="dates"></div>

        <div id="datetime"></div>
    </div>

    <div>
    <button id="doneBtn" onclick="goToTime()">Tap to Confirm</button>
    <button id="resetBtn" onclick="resetCalendar()">Select New Date</button>
    </div>

    <div id="timeSection" style="display:none; margin-top:100px;">
        <h2>Select Time</h2>
        <div id="timeSlots"></div>
    </div>

</div>

<script src="calendar.js" defer></script>

</body>
</html>
